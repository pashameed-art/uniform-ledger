<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><meta name="mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-title" content="Uniform Ledger"/><meta name="theme-color" content="#0d1420"/><title>Uniform Ledger</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#1a2332;font-family:-apple-system,system-ui,sans-serif;color:#f2ede1;min-height:100vh}#hdr{background:#0d1420;border-bottom:3px solid #c9a227;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}.sh{width:40px;height:40px;background:#c9a227;border-radius:50%;display:flex;align-items:center;justify-content:center}#hdr h1{font-size:18px;font-family:Georgia,serif}#hdr p{font-size:11px;color:#7a8699}#tabs{display:flex;background:#0d1420;border-bottom:1px solid #232f45}.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:#7a8699;border-bottom:2px solid transparent}.tab.on{color:#c9a227;border-bottom:2px solid #c9a227}#sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px}.card{background:#232f45;border-radius:10px;padding:10px}.cl{font-size:10px;color:#5a6a85;text-transform:uppercase}.cv{font-size:14px;font-weight:700;margin-top:4px}#esum,#msum{padding:12px}.ecard{background:#232f45;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center}#slist,#elist,#mlist{padding:0 12px 100px}.empty{text-align:center;padding:60px 0;color:#7a8699;font-size:14px}.row{background:#232f45;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}.rl{flex:1;min-width:0}.rn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rd{font-size:10px;color:#5a6a85;margin-left:6px;flex-shrink:0}.rm{font-size:11px;color:#7a8699;margin-top:3px;display:flex;gap:8px}.rr{text-align:right;margin-left:8px}.rp{font-size:13px;font-weight:700}.db{background:none;border:none;color:#5a6a85;cursor:pointer;font-size:14px;padding:2px}#fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;background:#c9a227;color:#0d1420;border:none;border-radius:50%;font-size:28px;cursor:pointer;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end}#ov.show{display:flex}#sh{background:#232f45;width:100%;border-radius:20px 20px 0 0;padding:20px}.sh-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.sh-hd h2{font-size:17px;font-family:Georgia,serif}#cnc{background:none;border:none;color:#7a8699;font-size:14px;cursor:pointer}label{display:block;font-size:11px;color:#7a8699;margin-bottom:4px}input,select{width:100%;background:#1a2332;color:#f2ede1;border:1px solid #3a4760;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;margin-bottom:10px;-webkit-appearance:none;box-sizing:border-box}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}#prev{background:#1a2332;border-radius:8px;padding:8px 12px;font-size:12px;color:#7a8699;display:none;justify-content:space-between;margin-bottom:10px}#prev.show{display:flex}.savbtn{width:100%;background:#c9a227;color:#0d1420;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer}</style></head><body>
<div id="hdr"><div class="sh"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d1420" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div><h1>Uniform Ledger</h1><p>Police Uniform Sales Tracker</p></div></div>
<div id="tabs">
  <button class="tab on" onclick="setTab('sales',this)">📦 Sales</button>
  <button class="tab" onclick="setTab('exp',this)">💸 Expense</button>
  <button class="tab" onclick="setTab('man',this)">👤 Mansoor</button>
</div>

<div id="sales-view">
<div id="sum"><div class="card"><div class="cl">Sales</div><div class="cv" id="ts" style="color:#f2ede1">₹0</div></div><div class="card"><div class="cl">Cost</div><div class="cv" id="tc" style="color:#e08e6d">₹0</div></div><div class="card"><div class="cl">Profit</div><div class="cv" id="tp" style="color:#7cc3a1">₹0</div></div></div>
<div id="slist"><div class="empty" id="sem">📦 No sales yet.</div></div></div>

<div id="exp-view" style="display:none">
<div id="esum"><div class="ecard"><div style="font-size:12px;color:#5a6a85">Total Expense</div><div class="cv" id="te" style="color:#e08e6d">₹0</div></div></div>
<div id="elist"><div class="empty" id="eem">💸 No expenses yet.</div></div></div>

<div id="man-view" style="display:none">
<div id="msum"><div class="ecard"><div style="font-size:12px;color:#5a6a85">Total Given to Mansoor</div><div class="cv" id="tm" style="color:#a78bfa">₹0</div></div></div>
<div id="mlist"><div class="empty" id="mem">👤 No entries yet.</div></div></div>

<button id="fab" onclick="openF()">+</button>
<div id="ov" onclick="closeF()"><div id="sh" onclick="event.stopPropagation()">
<div class="sh-hd"><h2 id="ftitle">New Sale</h2><button id="cnc" onclick="closeF()">Cancel</button></div>

<div id="sform">
<label>Date</label><input type="text" id="fd"/>
<label>Brand</label><select id="fc" onchange="onB()"><option value="">-- Select Brand --</option><option>Ajay England</option><option>Bonanza</option><option>BSL Charm</option><option>BSL Diplomate</option><option>BSL Executive Choice</option><option>DIG Binny</option><option>Khaki Touch</option><option>Oswal IPS</option><option>Peter England</option><option>RT Commisnor</option><option>Super Trovine</option><option>TNP Ajay</option><option>TNP Bond</option><option>Tro Stretch</option></select>
<div class="g2"><div><label>Qty</label><input type="number" id="fq" placeholder="3" oninput="upP()"/></div><div><label>Cost/Meter</label><input type="number" id="fm" placeholder="225" oninput="upP()"/></div></div>
<label>Sales (₹)</label><input type="number" id="fs" placeholder="1200" oninput="upP()"/>
<div id="prev"><span id="pc"></span><span id="pp"></span></div>
<button class="savbtn" onclick="savS()">Save Sale</button></div>

<div id="eform" style="display:none">
<label>Date</label><input type="text" id="ed"/>
<label>Category</label><select id="ec"><option value="">-- Select --</option><option>Bus/Train Ticket</option><option>Cigarette</option><option>Dinner</option><option>Iron</option><option>Lunch</option><option>Room Rent</option><option>Tea</option><option>Tiffin</option><option>Water/Juice</option></select>
<label>Amount (₹)</label><input type="number" id="ea" placeholder="50"/>
<button class="savbtn" onclick="savE()">Save Expense</button></div>

<div id="mform" style="display:none">
<label>Date</label><input type="text" id="md"/>
<label>Amount Given (₹)</label><input type="number" id="ma" placeholder="500"/>
<label>Note (optional)</label><input type="text" id="mn" placeholder="e.g. Advance"/>
<button class="savbtn" onclick="savM()">Save</button></div>

</div></div>
<script>
var P={"Ajay England":165,"Bonanza":225,"BSL Charm":225,"BSL Diplomate":230,"BSL Executive Choice":225,"DIG Binny":190,"Khaki Touch":225,"Oswal IPS":160,"Peter England":160,"RT Commisnor":300,"Super Trovine":200,"TNP Ajay":190,"TNP Bond":175,"Tro Stretch":260};
var S=JSON.parse(localStorage.getItem("ul-s")||"[]");
var E=JSON.parse(localStorage.getItem("ul-e")||"[]");
var M=JSON.parse(localStorage.getItem("ul-m")||"[]");
var curTab="sales";
function td(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")}
function fmt(n){return new Intl.NumberFormat("en-IN",{maximumFractionDigits:0}).format(n)}
function svS(){localStorage.setItem("ul-s",JSON.stringify(S))}
function svE(){localStorage.setItem("ul-e",JSON.stringify(E))}
function svM(){localStorage.setItem("ul-m",JSON.stringify(M))}
function setTab(t,el){curTab=t;document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("on")});el.classList.add("on");document.getElementById("sales-view").style.display=t==="sales"?"block":"none";document.getElementById("exp-view").style.display=t==="exp"?"block":"none";document.getElementById("man-view").style.display=t==="man"?"block":"none"}
function render(){
  var sl=document.getElementById("slist");sl.querySelectorAll(".row").forEach(function(r){r.remove()});
  var sem=document.getElementById("sem");
  if(S.length===0){sem.style.display="block"}else{sem.style.display="none";S.forEach(function(e){var d=document.createElement("div");d.className="row";d.style.borderLeft="3px solid "+(e.p>=0?"#7cc3a1":"#e0746d");d.innerHTML="<div class='rl'><div style='display:flex;align-items:center'><span class='rn'>"+e.b+"</span><span class='rd'>"+e.d+"</span></div><div class='rm'><span>Qty:"+fmt(e.q)+"</span><span>₹"+fmt(e.m)+"/m</span><span>Sale:₹"+fmt(e.s)+"</span></div></div><div class='rr'><div class='rp' style='color:"+(e.p>=0?"#7cc3a1":"#e0746d")+"'>"+(e.p>=0?"+":"")+"₹"+fmt(e.p)+"</div><button class='db' onclick='delS(\""+e.id+"\")'>🗑</button></div>";sl.appendChild(d)})}
  var t=S.reduce(function(a,e){return{s:a.s+e.s,c:a.c+e.c,p:a.p+e.p}},{s:0,c:0,p:0});
  document.getElementById("ts").textContent="₹"+fmt(t.s);document.getElementById("tc").textContent="₹"+fmt(t.c);
  var tp=document.getElementById("tp");tp.textContent="₹"+fmt(t.p);tp.style.color=t.p>=0?"#7cc3a1":"#e0746d";
  var el=document.getElementById("elist");el.querySelectorAll(".row").forEach(function(r){r.remove()});
  var eem=document.getElementById("eem");
  if(E.length===0){eem.style.display="block"}else{eem.style.display="none";E.forEach(function(e){var d=document.createElement("div");d.className="row";d.style.borderLeft="3px solid #e08e6d";d.innerHTML="<div class='rl'><div class='rn'>"+e.c+"</div><div style='font-size:11px;color:#7a8699;margin-top:3px'>"+e.d+"</div></div><div class='rr'><div class='rp' style='color:#e08e6d'>₹"+fmt(e.a)+"</div><button class='db' onclick='delE(\""+e.id+"\")'>🗑</button></div>";el.appendChild(d)})}
  var te=E.reduce(function(a,e){return a+e.a},0);document.getElementById("te").textContent="₹"+fmt(te);
  var ml=document.getElementById("mlist");ml.querySelectorAll(".row").forEach(function(r){r.remove()});
  var mem=document.getElementById("mem");
  if(M.length===0){mem.style.display="block"}else{mem.style.display="none";M.forEach(function(e){var d=document.createElement("div");d.className="row";d.style.borderLeft="3px solid #a78bfa";d.innerHTML="<div class='rl'><div class='rn'>"+(e.n||"Amount Given")+"</div><div style='font-size:11px;color:#7a8699;margin-top:3px'>"+e.d+"</div></div><div class='rr'><div class='rp' style='color:#a78bfa'>₹"+fmt(e.a)+"</div><button class='db' onclick='delM(\""+e.id+"\")'>🗑</button></div>";ml.appendChild(d)})}
  var tm=M.reduce(function(a,e){return a+e.a},0);document.getElementById("tm").textContent="₹"+fmt(tm);
}
function delS(id){S=S.filter(function(e){return e.id!==id});svS();render()}
function delE(id){E=E.filter(function(e){return e.id!==id});svE();render()}
function delM(id){M=M.filter(function(e){return e.id!==id});svM();render()}
function openF(){document.getElementById("fd").value=td();document.getElementById("ed").value=td();document.getElementById("md").value=td();document.getElementById("ftitle").textContent=curTab==="sales"?"New Sale":curTab==="exp"?"New Expense":"Mansoor - Amount Given";document.getElementById("sform").style.display=curTab==="sales"?"block":"none";document.getElementById("eform").style.display=curTab==="exp"?"block":"none";document.getElementById("mform").style.display=curTab==="man"?"block":"none";document.getElementById("ov").classList.add("show")}
function closeF(){document.getElementById("ov").classList.remove("show");["fc","fq","fm","fs","ec","ea","mn","ma"].forEach(function(i){var el=document.getElementById(i);if(el)el.value=""});document.getElementById("prev").classList.remove("show")}
function onB(){var b=document.getElementById("fc").value;if(P[b])document.getElementById("fm").value=P[b];upP()}
function upP(){var q=parseFloat(document.getElementById("fq").value),m=parseFloat(document.getElementById("fm").value),s=parseFloat(document.getElementById("fs").value),pv=document.getElementById("prev");if(!isNaN(q)&&!isNaN(m)&&!isNaN(s)){var c=q*m,p=s-c;document.getElementById("pc").textContent="Cost:₹"+fmt(c);var pp=document.getElementById("pp");pp.textContent="Profit:₹"+fmt(p);pp.style.color=p>=0?"#7cc3a1":"#e0746d";pv.classList.add("show")}else pv.classList.remove("show")}
function savS(){var d=document.getElementById("fd").value,b=document.getElementById("fc").value,q=parseFloat(document.getElementById("fq").value),m=parseFloat(document.getElementById("fm").value),s=parseFloat(document.getElementById("fs").value);if(!d||!b||isNaN(q)||isNaN(m)||isNaN(s)){alert("Fill all fields!");return}var c=q*m,p=s-c;S.unshift({id:Date.now().toString(),d:d,b:b,q:q,m:m,c:c,s:s,p:p});svS();render();closeF()}
function savE(){var d=document.getElementById("ed").value,c=document.getElementById("ec").value,a=parseFloat(document.getElementById("ea").value);if(!d||!c||isNaN(a)){alert("Fill all fields!");return}E.unshift({id:Date.now().toString(),d:d,c:c,a:a});svE();render();closeF()}
function savM(){var d=document.getElementById("md").value,a=parseFloat(document.getElementById("ma").value),n=document.getElementById("mn").value;if(!d||isNaN(a)){alert("Fill all fields!");return}M.unshift({id:Date.now().toString(),d:d,a:a,n:n});svM();render();closeF()}
render();
</script></body></html>
