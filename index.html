<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mass Uniform Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="background:var(--navy);padding:22px 18px 26px;position:relative;overflow:hidden;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--brass);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;">👕</div>
      <div>
        <div class="stencil" style="color:var(--brass);font-size:12px;font-weight:700;">UNIFORM STORE LEDGER</div>
        <div id="headerTitle" style="color:var(--cream);font-size:20px;font-weight:800;">Daily Accounts</div>
      </div>
    </div>
    <button onclick="MUS.App.openShopSettings()" style="background:rgba(255,255,255,.1);border:none;border-radius:10px;padding:8px;color:var(--cream);font-size:16px;">⚙️</button>
  </div>
  <div id="todayStrip" style="margin-top:18px;background:rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;"></div>
</div>

<div style="display:flex;gap:8px;padding:12px 14px 0;">
  <button id="tabDashboardBtn" onclick="MUS.App.switchTab('dashboard')" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;">📊 Dashboard</button>
  <button id="tabLedgerBtn" onclick="MUS.App.switchTab('ledger')" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;">📒 Ledger</button>
  <button id="tabBillBtn" onclick="MUS.App.switchTab('bill')" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;">📄 Bill</button>
</div>

<div id="dashboardView" class="hidden"></div>
<div id="ledgerView"></div>
<div id="billView" class="hidden"></div>

<button id="fabAdd" onclick="MUS.Dashboard.openEntryForm()" style="position:fixed;bottom:22px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--brass);border:3px solid var(--navy);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(28,43,58,.35);font-size:26px;font-weight:700;color:var(--navy);">+</button>

<div id="modalRoot"></div>

<!-- Plain (non-module) scripts, loaded in dependency order. Deliberately NOT
     using type="module" — Chrome blocks ES module fetches over file://,
     which is how this app is opened when added to a phone's home screen. -->
<script src="js/storage.js"></script>
<script src="js/products.js"></script>
<script src="js/customers.js"></script>
<script src="js/purchase.js"></script>
<script src="js/sales.js"></script>
<script src="js/reports.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>
</body>
</html>
