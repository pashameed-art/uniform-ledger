    document.getElementById("dashboardView").innerHTML = `
      <div style="padding:16px 14px 100px;">
        <div class="grid2" style="margin-bottom:10px;">
          ${dashCard("Today's Sales", money(todaysSales), "#4A5D3A")}
          ${dashCard("Today's Profit", money(todaysProfit), "#1C6758")}
          ${dashCard("Pending Customer Amt", money(pendingCustomerAmount), "#8B3A2E")}
          ${dashCard("Stock Value", money(stockValue), "#5A4632")}
          ${dashCard("Low Stock Items", lowStock.length, lowStock.length > 0 ? "#8B3A2E" : "#4A5D3A")}
          ${dashCard("Total Customers", totalCustomers, "#6b5b95")}
        </div>

        <div class="card" style="margin-bottom:10px;">
          <div class="stencil" style="font-size:11px;color:#6b6455;margin-bottom:8px;">Profit Summary</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span>This Month</span><span style="font-weight:800;color:#1C6758;">${money(monthProfit)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;"><span>This Year</span><span style="font-weight:800;color:#1C6758;">${money(yearProfit)}</span></div>
        </div>

        ${lowStockHtml}

        <button class="btn-primary" onclick="MUS.Dashboard.openReports()" style="margin-top:6px;">📈 View Reports</button>
      </div>`;
  }

  /* ---------------- Reports modal ---------------- */
  let activeReport = "daily";
  const REPORT_TABS = [
    { key: "daily", label: "Daily Sales" },
    { key: "monthly", label: "Monthly Sales" },
    { key: "productProfit", label: "Product Profit" },
    { key: "companySales", label: "Company Sales" },
    { key: "pending", label: "Customer Pending" },
  ];

  function openReports() {
    activeReport = "daily";
    MUS.App.openModal(reportsModalHtml());
  }
  function setReportView(key) {
    activeReport = key;
    MUS.App.openModal(reportsModalHtml());
  }

  function reportsModalHtml() {
    const state = MUS.App.state;
    const tabsHtml = REPORT_TABS.map((t) => `
      <button onclick="MUS.Dashboard.setReportView('${t.key}')" style="padding:8px 10px;border-radius:16px;font-size:11px;font-weight:700;flex-shrink:0;
        border:2px solid ${activeReport === t.key ? "var(--navy)" : "var(--border)"};
        background:${activeReport === t.key ? "var(--navy)" : "#fff"};color:${activeReport === t.key ? "var(--cream)" : "#6b6455"};">${t.label}</button>`).join("");

    let body = "";
    if (activeReport === "daily") {
      const rows = MUS.Reports.dailySalesReport(state.invoices);
      body = rows.length ? rows.map((r) => `
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:13px;font-weight:700;">${fmtDate(r.date)}</div><div style="font-size:11px;color:#8a8270;">${r.count} bill${r.count !== 1 ? "s" : ""}</div></div>
          <div style="text-align:right;"><div style="font-size:14px;font-weight:800;color:#4A5D3A;">${money(r.sales)}</div><div style="font-size:11px;color:#1C6758;">Profit ${money(r.profit)}</div></div>
        </div>`).join("") : emptyMsg("No sales yet.");
    } else if (activeReport === "monthly") {
      const rows = MUS.Reports.monthlySalesReport(state.invoices);
      body = rows.length ? rows.map((r) => `
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:13px;font-weight:700;">${r.month}</div><div style="font-size:11px;color:#8a8270;">${r.count} bill${r.count !== 1 ? "s" : ""}</div></div>
          <div style="text-align:right;"><div style="font-size:14px;font-weight:800;color:#4A5D3A;">${money(r.sales)}</div><div style="font-size:11px;color:#1C6758;">Profit ${money(r.profit)}</div></div>
        </div>`).join("") : emptyMsg("No sales yet.");
    } else if (activeReport === "productProfit") {
      const rows = MUS.Reports.productWiseProfit(state.invoices);
      body = rows.length ? rows.map((r) => `
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:13px;font-weight:700;">${esc(r.name)}</div><div style="font-size:11px;color:#8a8270;">Qty sold: ${r.qty}</div></div>
          <div style="text-align:right;"><div style="font-size:14px;font-weight:800;color:#4A5D3A;">${money(r.sales)}</div><div style="font-size:11px;color:#1C6758;">Profit ${money(r.profit)}</div></div>
        </div>`).join("") : emptyMsg("No sales yet.");
    } else if (activeReport === "companySales") {
      const rows = MUS.Reports.companyWiseSales(state.invoices);
      body = rows.length ? rows.map((r) => `
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:13px;font-weight:700;">${esc(r.company)}</div><div style="font-size:11px;color:#8a8270;">Qty sold: ${r.qty}</div></div>
          <div style="text-align:right;"><div style="font-size:14px;font-weight:800;color:#4A5D3A;">${money(r.sales)}</div><div style="font-size:11px;color:#1C6758;">Profit ${money(r.profit)}</div></div>
        </div>`).join("") : emptyMsg("No sales yet.");
    } else if (activeReport === "pending") {
      const rows = MUS.Reports.customerPendingReport(state.entries);
      body = rows.length ? rows.map((c) => `
        <div class="card" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:13px;font-weight:700;">${esc(c.name)}</div><div style="font-size:11px;color:#8a8270;">Given ${money(c.given)} · Paid ${money(c.paid)}</div></div>
          <div style="font-size:15px;font-weight:800;color:#8B3A2E;">${money(c.balance)}</div>
        </div>`).join("") : emptyMsg("No pending customer balances.");
    }

    return `
    <div class="modal-overlay" onclick="MUS.App.closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div class="stencil" style="font-size:13px;font-weight:700;">Reports</div>
          <button onclick="MUS.App.closeModal()" style="background:none;border:none;font-size:18px;">✕</button>
        </div>
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;">${tabsHtml}</div>
        ${body}
        <button class="btn-primary" style="margin-top:6px;" onclick="MUS.App.closeModal()">Done</button>
      </div>
    </div>`;
  }
  function emptyMsg(text) {
    return `<div style="text-align:center;color:#9a9280;padding:30px 10px;font-size:13px;">${text}</div>`;
  }

  return {
    render, renderTodayStrip, setFilterMonth, deleteEntry, openEntryForm, setEntryType, setEntryNote, setEntryField, saveEntry,
    renderDashboard, openReports, setReportView,
  };
})();



/* ===== app.js ===== */
/* ==========================================================================
   app.js
   Orchestrates the whole app: owns the single in-memory `state` object,
   wires up tab switching, generic modal open/close, the Shop Settings
   modal, and boots everything on load. Every feature module (Products,
   Purchase, Sales, Dashboard) talks to state only through MUS.App.
   ========================================================================== */

window.MUS = window.MUS || {};

MUS.App = (function () {
  let state = null;
  let currentTab = "ledger";

  /* ---------------- State helpers (shared by every module) ---------------- */
  function addEntry(entry) {
    state.entries.unshift(entry);
  }
  function saveState() {
    MUS.Storage.save(state);
  }

  /* ---------------- Generic modal plumbing ---------------- */
  function openModal(html) {
    document.getElementById("modalRoot").innerHTML = html;
  }
  function closeModal() {
    document.getElementById("modalRoot").innerHTML = "";
    render();
  }

  /* ---------------- Tabs ---------------- */
  function switchTab(tab) {
    currentTab = tab;
    const dashBtn = document.getElementById("tabDashboardBtn");
    const ledgerBtn = document.getElementById("tabLedgerBtn");
    const billBtn = document.getElementById("tabBillBtn");
    const active = { background: "var(--navy)", color: "var(--cream)", border: "2px solid var(--navy)" };
    const inactive = { background: "#fff", color: "#6b6455", border: "2px solid var(--border)" };
    Object.assign(dashBtn.style, tab === "dashboard" ? active : inactive);
    Object.assign(ledgerBtn.style, tab === "ledger" ? active : inactive);
    Object.assign(billBtn.style, tab === "bill" ? active : inactive);

    document.getElementById("dashboardView").classList.toggle("hidden", tab !== "dashboard");
    document.getElementById("ledgerView").classList.toggle("hidden", tab !== "ledger");
    document.getElementById("billView").classList.toggle("hidden", tab !== "bill");
    document.getElementById("fabAdd").classList.toggle("hidden", tab !== "ledger");
    document.getElementById("headerTitle").textContent =
      tab === "dashboard" ? "Dashboard" : tab === "ledger" ? "Daily Accounts" : "Create Bill";
    document.getElementById("todayStrip").style.display = tab === "ledger" ? "flex" : "none";
    render();
  }

  function render() {
    try {
      if (currentTab === "dashboard") {
        MUS.Dashboard.renderDashboard();
      } else if (currentTab === "ledger") {
        MUS.Dashboard.render();
      } else {
        MUS.Sales.render();
        MUS.Dashboard.renderTodayStrip();
      }
    } catch (err) {
      console.error("Render error on tab '" + currentTab + "':", err);
      showRenderError(err);
    }
  }

  function showRenderError(err) {
    const containerId = currentTab === "dashboard" ? "dashboardView" : currentTab === "ledger" ? "ledgerView" : "billView";
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `
      <div style="padding:20px 14px;">
        <div class="card" style="border-color:#8B3A2E;">
          <div style="font-weight:800;color:#8B3A2E;margin-bottom:6px;">⚠ Something went wrong loading this screen</div>
          <div style="font-size:12px;color:#6b6455;font-family:monospace;word-break:break-word;">${MUS.Utils.esc(err && err.message ? err.message : String(err))}</div>
          <div style="font-size:12px;color:#8a8270;margin-top:8px;">Try switching tabs again. If this keeps happening, the app files may need re-downloading.</div>
        </div>
      </div>`;
  }

  /* ---------------- Shop Settings modal ---------------- */
  function openShopSettings() {
    const s = state.shopInfo;
    const html = `
    <div class="modal-overlay" onclick="MUS.App.closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()" style="max-height:80vh;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div class="stencil" style="font-size:13px;font-weight:700;">Shop Details</div>
          <button onclick="MUS.App.closeModal()" style="background:none;border:none;font-size:18px;">✕</button>
        </div>
        <label class="field-label">Shop Name</label>
        <input type="text" class="field-input" id="shopName" style="margin-bottom:10px;" value="${MUS.Utils.esc(s.name)}">
        <label class="field-label">Address</label>
        <input type="text" class="field-input" id="shopAddress" style="margin-bottom:10px;" value="${MUS.Utils.esc(s.address)}">
        <label class="field-label">Phone Number</label>
        <input type="text" class="field-input" id="shopPhone" style="margin-bottom:18px;" value="${MUS.Utils.esc(s.phone)}">
        <button class="btn-primary" onclick="MUS.App.saveShopSettings()">Save</button>
      </div>
    </div>`;
    openModal(html);
  }
  function saveShopSettings() {
    state.shopInfo = {
      name: document.getElementById("shopName").value,
      address: document.getElementById("shopAddress").value,
      phone: document.getElementById("shopPhone").value,
    };
    saveState();
    closeModal();
  }

  /* ---------------- Boot ---------------- */
  function init() {
    try {
      state = MUS.Storage.load();
      switchTab("dashboard");
    } catch (err) {
      console.error("App failed to start:", err);
      document.body.innerHTML = `
        <div style="padding:24px 16px;font-family:sans-serif;">
          <div style="font-weight:800;color:#8B3A2E;font-size:16px;margin-bottom:8px;">⚠ App failed to start</div>
          <div style="font-size:13px;color:#444;font-family:monospace;word-break:break-word;">${(err && err.message) || err}</div>
          <div style="font-size:13px;color:#666;margin-top:12px;">Please make sure all files (index.html, css/, js/) were unzipped together into the same folder, then reopen index.html.</div>
        </div>`;
    }
  }

  return {
    get state() { return state; },
    addEntry, saveState, openModal, closeModal, switchTab, render,
    openShopSettings, saveShopSettings, init,
  };
})();

document.addEventListener("DOMContentLoaded", MUS.App.init);

</script>
</body>
</html>
